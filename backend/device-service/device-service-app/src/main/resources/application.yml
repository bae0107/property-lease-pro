spring:
  profiles:
    active: local

  docker:
    compose:
      enabled: false

  application:
    name: ${SERVICE_NAME:device-service}

  jackson:
    time-zone: Asia/Shanghai
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

  # 禁用默认的SQL脚本初始化，完全依赖 Liquibase
  sql:
    init:
      mode: never
  liquibase:
    enabled: true
    # Spring Boot 会自动找到这个 master 文件
    change-log: classpath:db/changelog/db.changelog-master.yaml
    # 统一使用配置的用户/密码
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    url: ${spring.datasource.url}
    driver-class-name: ${spring.datasource.driver-class-name}

  # 运行时 jOOQ 配置
  jooq:
    # 告诉 Spring Boot 的 jOOQ 自动配置使用什么方言
    sql-dialect: MYSQL

  data:
    redis:
      port: 6379
      timeout: 2000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

logging:
  level:
    root: INFO

server:
  port: 8083
  tomcat:
    threads:
      max: 200
    connection-timeout: 20000

#查看一些配置信息生效信息,先统一绑定在common中，后续看安全需求修改
management:
  endpoints:
    web:
      exposure:
        include: env,configprops
meter:
  config:
    path: "classpath:config/meterservice.properties"

security:
  mode: service
  service-name: ${spring.application.name}
  permit-paths:
    - /swagger-ui/**
    - /swagger-ui.html
    - /v3/api-docs/**
    - /v3/api-docs.yaml
    - /device/**
  jwt:
    service:
      secret: dev-service-jwt-secret-for-development-only
      expiration: 300
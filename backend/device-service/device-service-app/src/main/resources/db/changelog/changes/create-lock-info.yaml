databaseChangeLog:
  - changeSet:
      id: create-table-lock_info
      author: shibowen
      changes:
        - createTable:
            tableName: lock_info
            remarks: 门锁设备信息
            defaultCharset: utf8mb4
            columns:
              - column:
                  name: Id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: 门锁主键Id（业务内部）
              - column:
                  name: BoundRoomId
                  type: VARCHAR(255)
                  remarks: 绑定的房源的编号，空为无绑定
              - column:
                  name: DeviceId
                  type: VARCHAR(64)
                  remarks: 设备UUId
              - column:
                  name: Name
                  type: VARCHAR(64)
                  remarks: 门锁名称
              - column:
                  name: Mac
                  type: VARCHAR(64)
                  remarks: 门锁Mac
              - column:
                  name: SN
                  type: VARCHAR(64)
                  remarks: 门锁SN
              - column:
                  name: AuthKey
                  type: VARCHAR(64)
                  remarks: 门锁设备密钥
              - column:
                  name: ProductModel
                  type: VARCHAR(64)
                  remarks: 产品型号
              - column:
                  name: Hw
                  type: VARCHAR(64)
                  remarks: 固件版本
              - column:
                  name: Status
                  type: INT
                  defaultValue: 0
                  remarks: 设备状态(1=正常、2=低电量)
              - column:
                  name: OnlineStatus
                  type: INT
                  defaultValue: 0
                  remarks: 在线状态(1=在线、2=离线)
              - column:
                  name: OnlineStatusTime
                  type: VARCHAR(64)
                  remarks: 在线离线更新时间
              - column:
                  name: LockSignal
                  type: INT
                  defaultValue: 0
                  remarks: 信号
              - column:
                  name: Electricity
                  type: INT
                  defaultValue: 0
                  remarks: 电量
              - column:
                  name: Ccid
                  type: VARCHAR(64)
                  remarks: 门锁SIM卡ccid号
              - column:
                  name: Sw
                  type: VARCHAR(64)
                  remarks: 门锁软件版本号
              - column:
                  name: ProviderName
                  type: VARCHAR(225)
                  remarks: 第三方服务商名称（云丁、合一等）
              - column:
                  name: ProviderOp
                  type: INT
                  remarks: 第三方服务商op值
              - column:
                  name: CreateUserId
                  type: VARCHAR(64)
                  remarks: 创建人
              - column:
                  name: CreateUserName
                  type: VARCHAR(64)
                  remarks: 创建人名称
              - column:
                  name: CreateTime
                  type: VARCHAR(64)
                  remarks: 创建时间
              - column:
                  name: UpdateUserId
                  type: VARCHAR(64)
                  remarks: 修改人
              - column:
                  name: UpdateUserName
                  type: VARCHAR(64)
                  remarks: 更新人名称
              - column:
                  name: UpdateTime
                  type: VARCHAR(64)
                  remarks: 更新时间
              - column:
                  name: IsDeleted
                  type: INT
                  defaultValue: 1
                  constraints:
                    nullable: false
                  remarks: 删除标记(1=正常、2=删除)
              - column:
                  name: DeleteUserId
                  type: VARCHAR(64)
                  remarks: 删除人
              - column:
                  name: DeleteUserName
                  type: VARCHAR(64)
                  remarks: 删除人名称
              - column:
                  name: DeleteTime
                  type: VARCHAR(64)
                  remarks: 删除时间

        - rollback:
            - dropTable:
                tableName: lock_info
                cascadeConstraints: true

        - addUniqueConstraint:
            tableName: lock_info
            columnNames: ProviderOp, DeviceId
            constraintName: provider_device_composite_lock
            comment: 确保同一供应商UUID的唯一
databaseChangeLog:
  - changeSet:
      id: create-device-schedule-task-info-table
      author: shibowen
      changes:
        - createTable:
            tableName: device_schedule_task_info
            remarks: 设备定时任务记录表
            columns:
              - column:
                  name: Id
                  type: varchar(255)
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: 任务ID

              - column:
                  name: TaskName
                  type: varchar(255)
                  remarks: 任务名称

              - column:
                  name: TaskStatus
                  type: varchar(100)
                  remarks: 创建、运行中、结束

              - column:
                  name: TaskDetail
                  type: LONGTEXT
                  remarks: 任务涉及的细节

              - column:
                  name: TaskSTTime
                  type: varchar(64)
                  remarks: 任务创建时间（秒级日期）

              - column:
                  name: TaskEDTime
                  type: varchar(64)
                  remarks: 任务结束时间（秒级日期）

              - column:
                  name: TaskResult
                  type: varchar(100)
                  remarks: 暂无结果、成功、需复查

        - rollback:
            - dropTable:
                tableName: device_schedule_task_info
                cascadeConstraints: true
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:prod-db-instance.cloud.com}:${MYSQL_PORT:3306}/PROPERTY_LEASE_DEVICE?characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  #  liquibase:
  #    default-schema: PROPERTY_LEASE_DEVICE
  cache:
    type: redis
    redis:
      time-to-live: 3600s

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
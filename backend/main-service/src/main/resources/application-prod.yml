spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:prod-db-instance.cloud.com}:${MYSQL_PORT:3306}/PROPERTY_LEASE_MAIN?characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      # 生产环境可以加入连接池优化配置
  #  liquibase:
  #    default-schema: PUBLIC
  #    liquibase-schema: PUBLIC
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}


  redis:
    image: docker.m.daocloud.io/library/redis:7.2
    container_name: redis
    restart: unless-stopped
    profiles: [ "infra" ]
    ports:
      - "6379:6379"
    volumes:
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]

  nginx:
    image: docker.m.daocloud.io/library/nginx:1.25
    container_name: nginx
    restart: unless-stopped
    profiles: [ "infra" ]
    ports:
      - "80:80"
    volumes:
      - ../../frontend/web/dist:/usr/share/nginx/html
      - ../nginx/dev.conf:/etc/nginx/conf.d/default.conf

  gateway:
    image: myorg/gateway:latest
    container_name: gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod

  main-service:
    image: myorg/main-service:latest
    container_name: main-service
    environment:
      SPRING_PROFILES_ACTIVE: prod

  billing-service:
    image: myorg/billing-service:latest
    container_name: billing-service
    environment:
      SPRING_PROFILES_ACTIVE: prod

  device-service:
    image: myorg/device-service:latest
    container_name: device-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: mysql-dev
    restart: unless-stopped
    profiles: [ "infra" ]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: PROPERTY_LEASE_MAIN
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../mysql/init/init-schema.sql:/docker-entrypoint-initdb.d/init-init-schema.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - app-network

  redis:
    image: docker.m.daocloud.io/library/redis:7.2
    container_name: redis-dev
    restart: unless-stopped
    profiles: [ "infra" ]
    ports:
      - "6379:6379"
    volumes:
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - app-network

  nginx:
    image: docker.m.daocloud.io/library/nginx:1.25
    container_name: nginx-dev
    restart: unless-stopped
    profiles: [ "infra" ]
    ports:
      - "80:80"
    volumes:
      - ../../frontend/web/dist:/usr/share/nginx/html
      - ../nginx/dev.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

  gateway:
    build:
      context: ../../backend/gateway
    image: gateway
    container_name: gateway-dev
    profiles: [ "gateway" ]
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - app-network

  main-service:
    build:
      context: ../../backend/main-service
    image: main-service
    container_name: main-service-dev
    profiles: [ "main-service" ]
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  billing-service:
    build:
      context: ../../backend/billing-service
    image: billing-service
    container_name: billing-service-dev
    profiles: [ "billing-service" ]
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  device-service:
    build:
      context: ../../backend/device-service
    image: device-service
    container_name: device-service-dev
    profiles: [ "device-service" ]
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
# ⭐⭐⭐ 关键修正：networks 和 volumes 必须是顶级元素 ⭐⭐⭐
networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
